<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRI Analysis - NeuraSight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000; color: #fff; min-height: 100vh; overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 1200px; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
      background: rgba(20,20,20,0.4); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 50px;
    }
    .logo { font-size: 1.1rem; font-weight: 600; letter-spacing: 1px; }
    .nav-links { list-style: none; display: flex; gap: 2rem; }
    .nav-links a { color: #aaa; text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; transition: color 0.3s; }
    .nav-links a:hover { color: #fff; }

    /* Screen system — only one visible at a time */
    .screen { display: none; min-height: 100vh; padding: 7rem 2rem 3rem; flex-direction: column; align-items: center; justify-content: center; }
    .screen.active { display: flex; }

    /* ========== UPLOAD SCREEN ========== */
    .upload-screen { gap: 1.5rem; }
    .upload-screen h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em; }
    .upload-screen p { color: rgba(255,255,255,0.5); font-size: 0.9rem; }

    .upload-box {
      width: 100%; max-width: 500px; border: 2px dashed rgba(34,211,238,0.25);
      border-radius: 12px; padding: 3rem 2rem; text-align: center; cursor: pointer;
      transition: all 0.3s; position: relative;
    }
    .upload-box:hover { border-color: rgba(34,211,238,0.5); background: rgba(34,211,238,0.02); }
    .upload-box.has-file { border-color: rgba(34,211,238,0.5); background: rgba(34,211,238,0.04); }
    .upload-box input { display: none; }
    .upload-box label { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .upload-box .icon { color: #22d3ee; }
    .upload-box .text { color: rgba(255,255,255,0.4); font-size: 0.85rem; }
    .upload-box .text.selected { color: #22d3ee; font-weight: 500; }
    .upload-box .preview { max-width: 180px; max-height: 180px; border-radius: 8px; margin-top: 1rem; border: 1px solid rgba(34,211,238,0.2); }

    .formats { display: flex; gap: 0.4rem; }
    .formats span { padding: 0.3rem 0.7rem; font-size: 0.6rem; font-weight: 600; background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.15); border-radius: 20px; color: #22d3ee; }

    .analyze-btn {
      width: 100%; max-width: 500px; padding: 1rem; background: #22d3ee; border: none;
      border-radius: 8px; color: #000; font-weight: 700; font-size: 0.9rem; cursor: pointer;
      transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .analyze-btn:hover:not(:disabled) { background: #06b6d4; transform: translateY(-1px); }
    .analyze-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .samples { width: 100%; max-width: 500px; }
    .samples-label { font-size: 0.7rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .samples-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.4rem; }
    .sample-btn { padding: 0.5rem; background: transparent; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: rgba(255,255,255,0.4); font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
    .sample-btn:hover { border-color: rgba(255,255,255,0.25); color: #fff; }

    .note { font-size: 0.7rem; color: rgba(255,200,50,0.6); max-width: 500px; text-align: center; }

    /* ========== LOADING SCREEN ========== */
    .loading-screen { gap: 2rem; }
    .spinner { width: 60px; height: 60px; border: 3px solid rgba(34,211,238,0.1); border-top: 3px solid #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: rgba(255,255,255,0.6); font-size: 1rem; }
    .loading-stage { color: #22d3ee; font-size: 0.85rem; font-weight: 500; min-height: 1.2rem; }

    /* ========== RESULTS SCREEN ========== */
    .results-screen { gap: 0; padding-top: 6rem; align-items: stretch; }
    .results-container { max-width: 700px; width: 100%; margin: 0 auto; }

    .result-header { text-align: center; margin-bottom: 2rem; }
    .result-header .eyebrow { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
    .result-header .prediction { font-size: 2.8rem; font-weight: 800; color: #f472b6; letter-spacing: -0.02em; }

    .result-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
    .result-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 1.2rem; text-align: center; }
    .result-card .label { font-size: 0.6rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.3rem; font-weight: 600; }
    .result-card .val { font-size: 1.4rem; font-weight: 700; }
    .risk-high { color: #ef4444; } .risk-medium { color: #f59e0b; } .risk-low { color: #10b981; }

    .heatmap-section { text-align: center; margin-bottom: 1.5rem; padding: 1.5rem; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; }
    .heatmap-section .title { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; font-weight: 600; }
    .heatmap-section .images { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .heatmap-section .img-box { text-align: center; }
    .heatmap-section .img-box .img-label { font-size: 0.6rem; color: rgba(255,255,255,0.3); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .heatmap-section img { max-width: 180px; border-radius: 8px; border: 1px solid rgba(244,114,182,0.15); }
    .heatmap-section .caption { font-size: 0.6rem; color: rgba(255,255,255,0.25); margin-top: 0.8rem; }

    .summary-section { margin-bottom: 1.5rem; }
    .summary-section .title { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; font-weight: 600; }
    .summary-section .text { font-size: 0.82rem; color: rgba(255,255,255,0.65); line-height: 1.7; }
    .summary-section .rec { font-size: 0.78rem; color: rgba(255,255,255,0.5); line-height: 1.6; margin-top: 1rem; padding: 1rem; background: rgba(255,255,255,0.02); border-left: 3px solid rgba(34,211,238,0.3); border-radius: 4px; }

    .prob-section { margin-bottom: 1.5rem; }
    .prob-section .title { font-size: 0.65rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; font-weight: 600; }
    .prob-row { margin-bottom: 0.7rem; }
    .prob-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-bottom: 0.3rem; }
    .prob-labels .pct { color: #f472b6; font-weight: 700; }
    .prob-track { width: 100%; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
    .prob-fill { height: 100%; background: linear-gradient(90deg, #f472b6, #ec4899); border-radius: 3px; transition: width 0.6s; }

    .disclaimer { font-size: 0.6rem; color: rgba(255,255,255,0.2); font-style: italic; line-height: 1.5; margin-bottom: 2rem; text-align: center; }

    .new-upload-btn {
      display: block; width: 100%; max-width: 400px; margin: 0 auto; padding: 1rem;
      background: transparent; border: 1px solid rgba(34,211,238,0.3); border-radius: 8px;
      color: #22d3ee; font-weight: 600; font-size: 0.85rem; cursor: pointer;
      transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .new-upload-btn:hover { background: rgba(34,211,238,0.08); border-color: rgba(34,211,238,0.5); }

    @media (max-width: 600px) {
      .result-header .prediction { font-size: 2rem; }
      .upload-box { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">NeuraSight</div>
    <ul class="nav-links">
      <li><a href="index.html">HOME</a></li>
      <li><a href="research.html">RESEARCH</a></li>
      <li><a href="dashboard.html">DASHBOARD</a></li>
    </ul>
  </nav>

  <!-- SCREEN 1: Upload -->
  <div class="screen upload-screen active" id="screen-upload">
    <h1>MRI Analysis</h1>
    <p>Upload a brain MRI scan for AI-powered tumor classification</p>
    <div class="formats"><span>PNG</span><span>JPG</span><span>JPEG</span></div>
    <div class="upload-box" id="upload-box">
      <input type="file" id="file-input" accept=".png,.jpg,.jpeg">
      <label for="file-input">
        <div class="icon"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="text" id="upload-text">Drop MRI image here or click to browse</div>
      </label>
      <img class="preview" id="preview" style="display:none;">
    </div>
    <button class="analyze-btn" id="analyze-btn" disabled>Analyze MRI</button>
    <p class="note">⚠️ Use actual brain MRI images. Non-MRI images will default to "No Tumor".</p>
    <div class="samples">
      <p class="samples-label">Or try a sample:</p>
      <div class="samples-row">
        <button class="sample-btn" data-s="glioma_sample.jpg" data-l="Glioma">Glioma</button>
        <button class="sample-btn" data-s="meningioma_sample.jpg" data-l="Meningioma">Mening.</button>
        <button class="sample-btn" data-s="notumor_sample.jpg" data-l="No Tumor">No Tumor</button>
        <button class="sample-btn" data-s="pituitary_sample.jpg" data-l="Pituitary">Pituitary</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: Loading -->
  <div class="screen loading-screen" id="screen-loading">
    <div class="spinner"></div>
    <div class="loading-text">Analyzing MRI scan...</div>
    <div class="loading-stage" id="loading-stage"></div>
  </div>

  <!-- SCREEN 3: Results -->
  <div class="screen results-screen" id="screen-results">
    <div class="results-container" id="results-container"></div>
  </div>

  <script>
    const fileInput = document.getElementById('file-input');
    const uploadBox = document.getElementById('upload-box');
    const uploadText = document.getElementById('upload-text');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyze-btn');
    const screenUpload = document.getElementById('screen-upload');
    const screenLoading = document.getElementById('screen-loading');
    const screenResults = document.getElementById('screen-results');
    const loadingStage = document.getElementById('loading-stage');
    const resultsContainer = document.getElementById('results-container');

    let selectedFile = null;

    function showScreen(screen) {
      [screenUpload, screenLoading, screenResults].forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    // Store the uploaded image data URL for displaying in results
    let uploadedImageDataUrl = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      selectedFile = file;
      uploadBox.classList.add('has-file');
      uploadText.textContent = file.name;
      uploadText.classList.add('selected');
      const reader = new FileReader();
      reader.onload = (ev) => { preview.src = ev.target.result; preview.style.display = 'block'; uploadedImageDataUrl = ev.target.result; };
      reader.readAsDataURL(file);
      analyzeBtn.disabled = false;
    });

    uploadBox.addEventListener('dragover', (e) => { e.preventDefault(); uploadBox.style.borderColor = 'rgba(34,211,238,0.6)'; });
    uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor = ''; });
    uploadBox.addEventListener('drop', (e) => { e.preventDefault(); uploadBox.style.borderColor = ''; const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) { fileInput.files = e.dataTransfer.files; fileInput.dispatchEvent(new Event('change')); } });

    const stages = ['Validating image...', 'Preprocessing...', 'Running inference...', 'Generating heatmap...', 'Building report...'];

    analyzeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      showScreen(screenLoading);

      let stageIdx = 0;
      const stageTimer = setInterval(() => {
        if (stageIdx < stages.length) { loadingStage.textContent = stages[stageIdx]; stageIdx++; }
      }, 600);

      try {
        const form1 = new FormData(); form1.append('image', selectedFile);
        const form2 = new FormData(); form2.append('image', selectedFile);

        const [reportRes, gradcamRes] = await Promise.all([
          fetch('http://localhost:5000/api/report', { method: 'POST', body: form1 }),
          fetch('http://localhost:5000/api/gradcam', { method: 'POST', body: form2 }),
        ]);

        clearInterval(stageTimer);

        if (!reportRes.ok) { const err = await reportRes.json(); throw new Error(err.error || 'Analysis failed'); }
        const report = await reportRes.json();
        let heatmap = null;
        if (gradcamRes.ok) { const gc = await gradcamRes.json(); heatmap = gc.heatmap; }

        renderResults(report, heatmap);
        showScreen(screenResults);
      } catch (err) {
        clearInterval(stageTimer);
        resultsContainer.innerHTML = `<div style="text-align:center;padding:3rem;"><p style="color:#ef4444;font-size:1.1rem;margin-bottom:1rem;">Error: ${err.message}</p><button class="new-upload-btn" onclick="resetToUpload()">Try Again</button></div>`;
        showScreen(screenResults);
      }
    });

    function renderResults(r, heatmap) {
      let riskClass = 'risk-low';
      if (r.risk_level === 'High') riskClass = 'risk-high';
      else if (r.risk_level === 'Medium') riskClass = 'risk-medium';

      // Show heatmap only for tumor predictions (not for "No Tumor")
      let heatmapHtml = '';
      if (heatmap && r.prediction !== 'No Tumor') {
        heatmapHtml = `
        <div class="heatmap-section">
          <div class="title">MRI Comparison</div>
          <div class="images">
            <div class="img-box">
              <div class="img-label">Original MRI</div>
              <img src="${uploadedImageDataUrl}" alt="Original MRI">
            </div>
            <div class="img-box">
              <div class="img-label">Grad-CAM Heatmap</div>
              <img src="data:image/png;base64,${heatmap}" alt="Grad-CAM">
            </div>
          </div>
          <div class="caption">Red/warm regions = areas the AI focused on for its prediction</div>
        </div>`;
      } else if (r.prediction === 'No Tumor' && uploadedImageDataUrl) {
        heatmapHtml = `
        <div class="heatmap-section">
          <div class="title">Uploaded MRI</div>
          <div class="images">
            <div class="img-box">
              <img src="${uploadedImageDataUrl}" alt="Original MRI">
            </div>
          </div>
          <div class="caption">No abnormality detected — Grad-CAM not shown for healthy scans</div>
        </div>`;
      }

      resultsContainer.innerHTML = `
        <div class="result-header">
          <div class="eyebrow">NeuraSight AI Report</div>
          <div class="prediction">${r.prediction}</div>
        </div>
        <div class="result-cards">
          <div class="result-card"><div class="label">Confidence</div><div class="val">${r.confidence.toFixed(1)}%</div></div>
          <div class="result-card"><div class="label">Risk Level</div><div class="val ${riskClass}">${r.risk_level}</div></div>
        </div>
        ${heatmapHtml}
        <div class="summary-section">
          <div class="title">AI Summary</div>
          <div class="text">${r.ai_summary}</div>
          <div class="rec">${r.recommendation}</div>
        </div>
        <div class="prob-section">
          <div class="title">Probability Distribution</div>
          ${['Glioma','Meningioma','Pituitary','No Tumor'].map(c => `
            <div class="prob-row">
              <div class="prob-labels"><span>${c}</span><span class="pct">${r.probabilities[c].toFixed(1)}%</span></div>
              <div class="prob-track"><div class="prob-fill" style="width:${r.probabilities[c]}%"></div></div>
            </div>`).join('')}
        </div>
        <div class="disclaimer">${r.disclaimer}</div>
        <button class="new-upload-btn" onclick="resetToUpload()">Upload New MRI</button>
      `;
    }

    function resetToUpload() {
      selectedFile = null;
      uploadedImageDataUrl = null;
      uploadBox.classList.remove('has-file');
      uploadText.textContent = 'Drop MRI image here or click to browse';
      uploadText.classList.remove('selected');
      preview.style.display = 'none';
      fileInput.value = '';
      analyzeBtn.disabled = true;
      showScreen(screenUpload);
    }

    // Sample buttons
    document.querySelectorAll('.sample-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const res = await fetch(`/samples/${btn.dataset.s}`);
          const blob = await res.blob();
          selectedFile = new File([blob], btn.dataset.s, { type: 'image/jpeg' });
          uploadBox.classList.add('has-file');
          uploadText.textContent = `${btn.dataset.l} (sample)`;
          uploadText.classList.add('selected');
          const reader = new FileReader();
          reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; uploadedImageDataUrl = e.target.result; };
          reader.readAsDataURL(selectedFile);
          analyzeBtn.disabled = false;
        } catch (e) { console.error(e); }
      });
    });
  </script>
</body>
</html>
